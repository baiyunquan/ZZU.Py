name: CI

on:
  push:
    branches: [main,dev]
  workflow_dispatch:



jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python
        run: uv python install

      - name: Build
        id: build
        run: |
          uv sync --locked --all-extras
          uv build

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: zzupy_ci_${{ github.sha }}
          path: dist/
          compression-level: 9

